  KABQ: 2
  KELP: 2
  KTUS: 2
  KOKC: 2
  KTUL: 2
  KMEM: 2
  KBHM: 2
  KJAX: 2
  KPBI: 2
  KRSW: 2
  KSAV: 2
  KCHS: 2
  KGSP: 2
  KMYR: 2
  KSDF: 2
  KLEX: 2
  KHSV: 2
  KMCI: 2
  KOMA: 2
