# US region config — defaults for `radiotalk data generate --config us`.
# Every knob the ScenarioSampler reads at runtime lives here. Edit this file
# (or copy it to a new region YAML) to retune distributions without touching code.

name: us
allowed_regions: [us]

# ────────────────────────────────────────────────────────────────────────────
# Airport weighting
# ────────────────────────────────────────────────────────────────────────────
# TierWeighter assigns weights to airports based on their tier below.
# Anything not listed in `airport_tiers` gets `tier_weights.default`.
tier_weights:
  "1": 50.0      # major hubs
  "2": 10.0      # regionals
  default: 1.0   # everything else (small towered + uncontrolled fields)

airport_tiers:
  # ─── Tier 1 — major US hubs ───
  KATL: 1
  KLAX: 1
  KORD: 1
  KDFW: 1
  KDEN: 1
  KJFK: 1
  KSFO: 1
  KSEA: 1
  KLAS: 1
  KMCO: 1
  KCLT: 1
  KEWR: 1
  KPHX: 1
  KMIA: 1
  KIAH: 1
  KBOS: 1
  KMSP: 1
  KFLL: 1
  KDTW: 1
  KPHL: 1
  KLGA: 1
  KBWI: 1
  KSLC: 1
  KIAD: 1
  KDCA: 1
  KSAN: 1
  KTPA: 1
  KPDX: 1
  PHNL: 1
  KSTL: 1
  KMDW: 1
  KAUS: 1
  KBNA: 1
  KMSY: 1
  KRDU: 1
  # ─── Tier 2 — US regionals ───
  KCLE: 2
  KCVG: 2
  KCMH: 2
  KIND: 2
  KMKE: 2
  KPIT: 2
  KRIC: 2
  KBUF: 2
